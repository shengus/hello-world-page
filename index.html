<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello, World!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      animation: fadeSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 1rem;
      animation: fadeSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      opacity: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    .orb-1 {
      width: 300px; height: 300px;
      background: #7c3aed;
      top: -100px; left: -80px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 250px; height: 250px;
      background: #06b6d4;
      bottom: -80px; right: -60px;
      animation-delay: -4s;
    }

    .orb-3 {
      width: 200px; height: 200px;
      background: #ec4899;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -2s;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -20px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(15px, 10px) scale(1.02); }
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #7c3aed, #06b6d4);
      margin: 1.5rem auto 0;
      border-radius: 2px;
      animation: fadeSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <h1>Hello, World!</h1>
    <p class="subtitle">Welcome to the internet.</p>
    <div class="divider"></div>
  </div>
</body>
</html>
